<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sip & Chill Café - Luxury Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .item-hover {
            transition: all 0.3s ease;
        }
        .item-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <!-- Header -->
    <header class="glass-effect sticky top-0 z-50 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-coffee text-3xl text-yellow-400"></i>
                <h1 class="text-2xl md:text-3xl font-bold">Sip & Chill Café</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div id="totalSales" class="bg-green-500 px-4 py-2 rounded-full text-sm font-bold flex items-center space-x-2">
                    <i class="fas fa-chart-line"></i>
                    <span>Total Sales: Rs. <span id="salesAmount">0</span></span>
                </div>
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center cursor-pointer pulse" onclick="printQR()">
                    <i class="fas fa-qrcode text-xl"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Hero Section -->
        <div class="text-center mb-12 fade-in">
            <h2 class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-yellow-400 to-pink-400 bg-clip-text text-transparent">
                Luxury Menu
            </h2>
            <p class="text-xl md:text-2xl opacity-90 mb-8">Scan QR • Order • Enjoy ☕✨</p>
            <div class="w-24 h-24 bg-white/20 rounded-full mx-auto flex items-center justify-center mb-8 glass-effect">
                <i class="fas fa-utensils text-4xl text-yellow-400"></i>
            </div>
        </div>

        <!-- Categories -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            <button onclick="filterItems('all')" class="glass-effect p-6 rounded-2xl text-center item-hover">
                <i class="fas fa-list text-3xl text-yellow-400 mb-3"></i>
                <span class="font-semibold">All Items</span>
            </button>
            <button onclick="filterItems('burger')" class="glass-effect p-6 rounded-2xl text-center item-hover">
                <i class="fas fa-hamburger text-3xl text-orange-400 mb-3"></i>
                <span class="font-semibold">Burgers</span>
            </button>
            <button onclick="filterItems('chicken')" class="glass-effect p-6 rounded-2xl text-center item-hover">
                <i class="fas fa-drumstick-bite text-3xl text-red-400 mb-3"></i>
                <span class="font-semibold">Chicken</span>
            </button>
            <button onclick="filterItems('drinks')" class="glass-effect p-6 rounded-2xl text-center item-hover">
                <i class="fas fa-coffee text-3xl text-purple-400 mb-3"></i>
                <span class="font-semibold">Drinks</span>
            </button>
        </div>

        <!-- Menu Items -->
        <div id="menuItems" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
            <!-- Items will be populated by JavaScript -->
        </div>

        <!-- Cart Section -->
        <div id="cartSection" class="glass-effect p-8 rounded-3xl mb-12 fade-in">
            <h3 class="text-3xl font-bold mb-6 flex items-center">
                <i class="fas fa-shopping-cart text-yellow-400 mr-3"></i>
                Your Order
            </h3>
            <div id="cartItems" class="space-y-4 mb-8">
                <p class="text-center text-lg opacity-75">Your cart is empty</p>
            </div>
            <div class="border-t border-white/20 pt-6 space-y-4">
                <div class="flex justify-between text-2xl font-bold">
                    <span>Total:</span>
                    <span id="cartTotal">Rs. 0</span>
                </div>
                <div class="flex space-x-3">
                    <button onclick="clearCart()" class="flex-1 bg-red-500/80 hover:bg-red-500 text-white py-4 px-6 rounded-2xl font-semibold transition-all duration-300">
                        <i class="fas fa-trash mr-2"></i>Clear Cart
                    </button>
                    <button onclick="placeOrder()" class="flex-1 bg-green-500/90 hover:bg-green-500 text-white py-4 px-6 rounded-2xl font-bold transition-all duration-300 pulse">
                        <i class="fab fa-whatsapp mr-2"></i>Order Now
                    </button>
                </div>
            </div>
            <div id="orderToken" class="mt-6 p-4 bg-yellow-500/20 rounded-2xl text-center hidden">
                <i class="fas fa-ticket-alt text-2xl text-yellow-400 mb-2"></i>
                <p class="font-bold text-xl">Order Token: <span id="tokenNumber"></span></p>
            </div>
        </div>
    </div>

    <script>
        // Menu Items Data
        const menuItems = [
            { id: 1, name: 'Zinger Burger', price: 300, category: 'burger', emoji: '🍔' },
            { id: 2, name: 'Chicken Shawarma', price: 250, category: 'chicken', emoji: '🥙' },
            { id: 3, name: 'Chai', price: 120, category: 'drinks', emoji: '☕' },
            { id: 4, name: 'Masala Fries', price: 120, category: 'burger', emoji: '🍟' },
            { id: 5, name: 'Paratha', price: 100, category: 'chicken', emoji: '🥙' },
            { id: 6, name: 'Biscuits', price: 40, category: 'drinks', emoji: '🍪' },
            { id: 7, name: 'Lays', price: 40, category: 'burger', emoji: '🥔' },
            { id: 8, name: 'Chicken Biryani', price: 300, category: 'chicken', emoji: '🍛' },
            { id: 9, name: 'Manchurian', price: 300, category: 'chicken', emoji: '🥟' },
            { id: 10, name: 'Chowmein', price: 300, category: 'chicken', emoji: '🍜' },
            { id: 11, name: 'Roll', price: 40, category: 'burger', emoji: '🌯' },
            { id: 12, name: 'Samosa', price: 40, category: 'burger', emoji: '🥟' },
            { id: 13, name: 'Mango Juice Bottle', price: 130, category: 'drinks', emoji: '🥭' },
            { id: 14, name: 'Cold Drink', price: 120, category: 'drinks', emoji: '🥤' },
            { id: 15, name: 'Water Bottle', price: 60, category: 'drinks', emoji: '💧' }
        ];

        let cart = [];
        let totalSales = localStorage.getItem('totalSales') ? parseInt(localStorage.getItem('totalSales')) : 0;
        let orderCounter = localStorage.getItem('orderCounter') ? parseInt(localStorage.getItem('orderCounter')) : 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateSalesDisplay();
            renderMenuItems('all');
        });

        // Render Menu Items
        function renderMenuItems(category = 'all') {
            const container = document.getElementById('menuItems');
            container.innerHTML = '';
            
            const filteredItems = category === 'all' ? menuItems : menuItems.filter(item => item.category === category);
            
            filteredItems.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'glass-effect p-6 rounded-3xl item-hover cursor-pointer hover:border-yellow-400 border border-white/20 fade-in';
                itemEl.innerHTML = `
                    <div class="text-4xl mb-4">${item.emoji}</div>
                    <h3 class="text-xl font-bold mb-2">${item.name}</h3>
                    <div class="text-2xl font-bold text-yellow-400 mb-4">Rs. ${item.price}</div>
                    <button onclick="addToCart(${item.id})" class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white py-3 px-6 rounded-2xl font-semibold transition-all duration-300">
                        <i class="fas fa-plus mr-2"></i>Add to Cart
                    </button>
                `;
                container.appendChild(itemEl);
            });
        }

        // Filter Items
        function filterItems(category) {
            renderMenuItems(category);
            document.querySelectorAll('[onclick="filterItems()"]').forEach(btn => {
                btn.classList.remove('bg-white/20');
            });
            event.target.classList.add('bg-white/20');
        }

        // Cart Functions
        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const existingItem = cart.find(cartItem => cartItem.id === itemId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...item, quantity: 1 });
            }
            
            updateCartDisplay();
            showNotification(`${item.name} added to cart!`);
        }

        function removeFromCart(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCartDisplay();
        }

        function updateQuantity(itemId, change) {
            const item = cart.find(i => i.id === itemId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(itemId);
                } else {
                    updateCartDisplay();
                }
            }
        }

        function updateCartDisplay() {
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<p class="text-center text-lg opacity-75 py-8">Your cart is empty</p>';
                cartTotalEl.textContent = 'Rs. 0';
                return;
            }
            
            cartItemsEl.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center p-4 bg-white/10 rounded-2xl">
                    <div class="flex items-center space-x-3">
                        <span class="text-2xl">${item.emoji}</span>
                        <div>
                            <p class="font-semibold">${item.name}</p>
                            <p class="text-sm opacity-75">Rs. ${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button onclick="updateQuantity(${item.id}, -1)" class="w-10 h-10 bg-red-500/80 hover:bg-red-500 rounded-xl flex items-center justify-center text-white font-bold">-</button>
                        <span class="font-bold text-xl min-w-[2rem] text-center">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)" class="w-10 h-10 bg-green-500/80 hover:bg-green-500 rounded-xl flex items-center justify-center text-white font-bold">+</button>
                        <span class="font-bold text-lg">Rs. ${item.price * item.quantity}</span>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-300">
                            <i class="fas fa-trash text-xl"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalEl.textContent = `Rs. ${total}`;
        }

        // Order Functions
        function placeOrder() {
            if (cart.length === 0) {
                alert('Please add items to cart first!');
                return;
            }
            
            orderCounter++;
            const token = `SIPC${String(orderCounter).padStart(4, '0')}`;
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            // Update sales
            totalSales += total;
            localStorage.setItem('totalSales', totalSales);
            localStorage.setItem('orderCounter', orderCounter);
            updateSalesDisplay();
            
            // Show token
            document.getElementById('tokenNumber').textContent = token;
            document.getElementById('orderToken').classList.remove('hidden');
            
            // WhatsApp message
            const message = `🛒 *New Order - Sip & Chill Café*\n\n` +
                          `🎫 *Token:* ${token}\n` +
                          `💰 *Total:* Rs. ${total}\n\n` +
                          `*Order Details:*\n${cart.map(item => `• ${item.name} x${item.quantity} = Rs. ${item.price * item.quantity}`).join('\n')}\n\n` +
                          `⏰ *Time:* ${new Date().toLocaleString()}\n` +
                          `📱 *Customer will pay at pickup*`;
            
            const whatsappUrl = `https://wa.me/923017769935?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            
            // Clear cart after 3 seconds
            setTimeout(() => {
                clearCart();
                document.getElementById('orderToken').classList.add('hidden');
            }, 3000);
            
            showNotification(`Order placed! Token: ${token}`);
        }

        function clearCart() {
            cart = [];
            updateCartDisplay();
            document.getElementById('orderToken').classList.add('hidden');
        }

        // Utility Functions
        function updateSalesDisplay() {
            document.getElementById('salesAmount').textContent = totalSales.toLocaleString();
        }

        function showNotification(message) {
            // Simple notification
            const notification = document.createElement('div');
            notification.className = 'fixed top-20 right-4 bg-green-500 text-white px-6 py-4 rounded-2xl shadow-2xl z-50 fade-in';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function printQR() {
            const qrUrl = window.location.href;
            const message = `📱 QR Code scanned!\nPlease visit the menu website to place your order.`;
            window.open(`https://wa.me/923017769935?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
